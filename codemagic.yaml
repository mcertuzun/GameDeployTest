workflows:
  unity-ios-android:
    name: Unity iOS & Android (Test Build)
    max_build_duration: 60
    environment:
      unity: 6000.3.11f1
      xcode: latest
      vars:
        BUNDLE_ID: com.mcertuzun.game01
      groups:
        - unity_credentials
        - firebase_credentials
        - appstore_credentials
    scripts:
      - name: Unity lisans aktive et
        script: |
          echo "Unity path: $UNITY_HOME"
          $UNITY_HOME/Unity \
            -quit -batchmode -nographics \
            -serial $UNITY_SERIAL \
            -username $UNITY_USERNAME \
            -password $UNITY_PASSWORD \
            -logFile /tmp/unity-activation.log || true
          cat /tmp/unity-activation.log || true

      - name: Unity iOS build
        script: |
          $UNITY_HOME/Unity \
            -quit -batchmode -nographics \
            -projectPath . \
            -executeMethod BuildScript.BuildIOS \
            -logFile build-ios.log \
            -buildTarget iOS

      - name: Unity Android build
        script: |
          $UNITY_HOME/Unity \
            -quit -batchmode -nographics \
            -projectPath . \
            -executeMethod BuildScript.BuildAndroid \
            -logFile build-android.log \
            -buildTarget Android

      - name: Firebase App Distribution
        script: |
          npm install -g firebase-tools
          firebase appdistribution:distribute Builds/Android/game.apk \
            --app $FIREBASE_APP_ID \
            --token $FIREBASE_TOKEN \
            --groups "testers" \
            --release-notes "Codemagic build $CM_COMMIT"

      - name: Unity lisans iade et
        script: |
          $UNITY_HOME/Unity \
            -quit -batchmode -returnlicense \
            -logFile /tmp/unity-return.log || true

    artifacts:
      - Builds/iOS/**
      - Builds/Android/**
      - build-ios.log
      - build-android.log
