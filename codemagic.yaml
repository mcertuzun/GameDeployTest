workflows:
  unity-ios-android:
    name: Unity iOS & Android (Test Build)
    max_build_duration: 60
    environment:
      unity: 6000.3.11f1
      xcode: latest
      vars:
        BUNDLE_ID: com.mcertuzun.game01
      groups:
        - unity_credentials
        - firebase_credentials
        - appstore_credentials
    scripts:
      - name: Unity lisans aktive et
        script: |
          echo "=== UNITY_HOME: $UNITY_HOME ==="
          echo "=== UNITY_BIN: $UNITY_BIN ==="
          $UNITY_HOME/Contents/MacOS/Unity \
            -quit -batchmode -nographics \
            -serial "$UNITY_SERIAL" \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" \
            -logFile -
          echo "=== Activation exit code: $? ==="

      - name: Unity iOS build
        script: |
          $UNITY_HOME/Contents/MacOS/Unity \
            -quit -batchmode -nographics \
            -projectPath . \
            -executeMethod BuildScript.BuildIOS \
            -logFile - \
            -buildTarget iOS

      - name: Unity Android build
        script: |
          $UNITY_HOME/Contents/MacOS/Unity \
            -quit -batchmode -nographics \
            -projectPath . \
            -executeMethod BuildScript.BuildAndroid \
            -logFile - \
            -buildTarget Android

      - name: Firebase App Distribution
        script: |
          echo $FIREBASE_SERVICE_ACCOUNT > /tmp/firebase-sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json \
          firebase appdistribution:distribute Builds/Android/game.apk \
            --app $FIREBASE_APP_ID \
            --groups "testers" \
            --release-notes "Codemagic build $CM_COMMIT"
          rm -f /tmp/firebase-sa.json

      - name: Unity lisans iade et
        script: |
          $UNITY_HOME/Contents/MacOS/Unity \
            -quit -batchmode -returnlicense \
            -logFile - || true

    artifacts:
      - Builds/iOS/**
      - Builds/Android/**
