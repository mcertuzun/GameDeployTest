name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  UNITY_PATH: /Applications/Unity/Hub/Editor/6000.3.11f1/Unity.app/Contents/MacOS/Unity

jobs:
  build-ios:
    name: Build iOS
    runs-on: [self-hosted, macOS, arm64, unity]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-iOS-

      - name: Build iOS
        run: |
          $UNITY_PATH \
            -quit \
            -batchmode \
            -nographics \
            -projectPath . \
            -executeMethod BuildScript.BuildIOS \
            -logFile build-ios.log \
            -buildTarget iOS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iOS-Build
          path: |
            Builds/iOS
            build-ios.log
          retention-days: 3

  deploy-testflight:
    name: Deploy to TestFlight
    needs: build-ios
    runs-on: [self-hosted, macOS, arm64, unity]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to TestFlight
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
